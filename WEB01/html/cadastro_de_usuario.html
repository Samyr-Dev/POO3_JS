<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/WEB01/css/style.css">
    <title>Document</title>
</head>

<body>

    <section class="formulario">
        <a href="/WEB01/html/index.html">
            Home
        </a>
        &nbsp;&nbsp;
        <a href="/WEB01/html/tarefas.html">
            Tarefas
        </a>
        &nbsp;&nbsp;
        <a href="/WEB01/html/cadastro_de_usuario.html" text-decoration="none">
            Usuário
        </a>

        <hr>
        <h4 id="titulo-cadastro"> Cadastro de Usuário </h4>
    </section>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" placeholder="Digite o nome completo do usuário"><br>
    <br>
    <label for="email">Email:</label>
    <input type="text" id="email" placeholder="Digite o email do usuário"><br>
    <br>
    <label for="number">Idade:</label>
    <input type="number" id="idade" placeholder="Digite a idade do usuário"><br>
    <br>
    <label for="Data de Nascimento:">Data de Nascimento:</label>
    <input type="date" id="data_nascimento" placeholder="Digite a data de nascimento do usuário">
    <br>
    <br>
    <label for="sexo">Sexo:</label>
    <select id="sexo" placeholder="Selecione o sexo do usuário">
        <option value="">Selecione um valor</option>
        <option value="masculino">Masculino</option>
        <option value="feminino">Feminino</option>

    </select>
    <br>
    <br><label for="">Observação:</label>
    <br>
    <textarea id="observacao" placeholder="Digite uma observação sobre o usuário" rows="6" cols="25"></textarea>

    <br>
    <button id="btn-cadastrar">Cadastrar</button>




    <script src="/WEB01/js/formulario.js"></script>
</body>

</html>
